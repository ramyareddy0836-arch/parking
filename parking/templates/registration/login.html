{% extends "parking/base.html" %}

{% block content %}
<div class="min-h-full w-full flex items-center justify-center p-6 pb-32 bg-[#0B0E14] overflow-y-auto">
    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-semibold text-white tracking-tight">Welcome Back</h1>
            <p class="text-gray-400 text-sm mt-2">Sign in to your SmartPark account</p>
        </div>
        
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Username</label>
                <input type="text" name="username" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition shadow-inner">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">Password</label>
                <input type="password" name="password" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition shadow-inner">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 rounded-xl transition mt-4 shadow-lg shadow-indigo-500/30">
                Sign In
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-400">
            Don't have an account? <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300 font-medium">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
