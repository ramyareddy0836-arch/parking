{% extends "parking/base.html" %}

{% block content %}
<div class="h-full w-full flex items-center justify-center p-6 bg-[#0B0E14]">
    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-semibold text-white tracking-tight">Create Account</h1>
            <p class="text-gray-400 text-sm mt-2">Join SmartPark to reserve spaces</p>
        </div>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <!-- Iterate over form fields to render properly with custom classes -->
            {% for field in form %}
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            
            <!-- Quick JS to style the django generated inputs -->
            <script>
                document.querySelectorAll('input').forEach(i => {
                    if(i.type !== 'hidden') {
                        i.className = "w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-indigo-500 transition shadow-inner text-sm";
                    }
                });
            </script>
            
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 rounded-xl transition mt-6 shadow-lg shadow-indigo-500/30">
                Register
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-400">
            Already have an account? <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
