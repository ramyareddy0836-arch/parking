{% extends "parking/base.html" %}

{% block content %}
<div class="h-full w-full bg-slate-50 flex flex-col pt-20 pb-28 px-4 sm:max-w-3xl sm:mx-auto relative">

    <div class="glass-panel w-full rounded-2xl flex items-center justify-between p-4 px-6 border border-slate-200">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xl shadow-inner">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div>
                <h2 class="font-bold text-slate-900 text-lg">SmartPark Assistant</h2>
                <p class="text-xs text-green-600 font-bold tracking-wide"><i class="fa-solid fa-circle text-[8px] mr-1"></i> ONLINE</p>
            </div>
        </div>
        <a href="{% url 'index' %}" class="w-10 h-10 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500 transition shadow-sm">
            <i class="fa-solid fa-xmark"></i>
        </a>
    </div>

    <!-- Chat Area -->
    <div class="flex-1 overflow-y-auto mt-4 px-2 space-y-4" id="chatbox">
        <!-- Message 1 -->
        <div class="flex items-end gap-3">
            <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xs shrink-0 shadow-sm"><i class="fa-solid fa-robot"></i></div>
            <div class="bg-white px-5 py-3 rounded-2xl rounded-bl-sm shadow-sm border border-slate-100 text-sm text-slate-700 max-w-[80%]">
                Hello {{ request.user.username|default:'there' }}! 👋 I'm the SmartPark AI Assistant. How can I help you clear your queries today?
            </div>
        </div>
        
    </div>

    <!-- Input Area -->
    <div class="mt-4 glass-panel rounded-full flex items-center p-2 shadow-2xl relative border border-slate-200">
        <input type="text" id="chatInput" placeholder="Type your query here..." class="flex-1 bg-transparent px-4 border-none outline-none text-slate-800 text-sm placeholder-slate-400">
        <button onclick="sendMessage()" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center shadow-md hover:bg-blue-600 transition">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

</div>

{% endblock %}

{% block extra_js %}
<script>
    const API_KEY = "AIzaSyAqav6j93DfGNiqv8yC_cec415EJeLxTVQ";
    const SYSTEM_PROMPT = "You are the AI Assistant for SmartPark, an advanced parking solution in India. Your name is SmartPark Bot. Help users find parking spots (New Delhi, Mumbai, Bangalore, Gurugram), understand tariffs (approx ₹50-150/hr), find EV chargers, and navigate the app. Be professional, friendly, and concise. Current location context: Connaught Place, Aerocity, BKC, Cyber Hub, UB City.";

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const box = document.getElementById('chatbox');
        const userText = input.value.trim();
        if(!userText) return;

        // User message
        const msg = document.createElement('div');
        msg.className = "flex items-end gap-3 justify-end";
        msg.innerHTML = `<div class="bg-primary text-white px-5 py-3 rounded-2xl rounded-br-sm shadow-md text-sm max-w-[80%]">${userText.replace(/<\/?[^>]+(>|$)/g, "")}</div>`;
        box.appendChild(msg);
        input.value = '';
        box.scrollTop = box.scrollHeight;

        // Robot thinking
        const thinking = document.createElement('div');
        thinking.className = "flex items-end gap-3 thinking-bubble";
        thinking.innerHTML = `<div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xs shrink-0 shadow-sm"><i class="fa-solid fa-robot"></i></div>
        <div class="bg-white px-5 py-3 rounded-2xl rounded-bl-sm shadow-sm border border-slate-100 text-sm text-slate-400 italic">Thinking...</div>`;
        box.appendChild(thinking);
        box.scrollTop = box.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${SYSTEM_PROMPT}\n\nUser: ${userText}` }] }]
                })
            });

            const data = await response.json();
            box.removeChild(thinking);
            
            let answer = "I'm experiencing a protocol error. Please try again shortly.";
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                answer = data.candidates[0].content.parts[0].text;
            }

            const reply = document.createElement('div');
            reply.className = "flex items-end gap-3";
            reply.innerHTML = `<div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xs shrink-0 shadow-sm"><i class="fa-solid fa-robot"></i></div>
            <div class="bg-white px-5 py-3 rounded-2xl rounded-bl-sm shadow-sm border border-slate-100 text-sm text-slate-700 max-w-[80%]">${answer}</div>`;
            box.appendChild(reply);
        } catch (error) {
            box.removeChild(thinking);
            const errorMsg = document.createElement('div');
            errorMsg.innerHTML = `<div class="text-xs text-red-500 text-center mt-2">Error connecting to AI Grid</div>`;
            box.appendChild(errorMsg);
        }

        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('chatInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
